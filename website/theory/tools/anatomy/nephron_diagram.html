<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nephron Diagram — Drawable</title>
<style>
body{background:#0a0a0f;margin:0;padding:10px;font-family:Georgia,serif}
h1{font-family:monospace;font-size:1em;color:#ff6b35;text-align:center;margin-bottom:4px}
.sub{text-align:center;font-size:0.7em;color:#666;margin-bottom:8px}
svg{display:block;margin:0 auto;max-width:100%}
</style>
</head>
<body>
<h1>NEPHRON — DRAWABLE EXAM DIAGRAM</h1>
<div class="sub">Reproduce this U-shape in 2 min. Label segments + pin drugs/diseases/hormones.</div>

<svg viewBox="0 0 820 720" xmlns="http://www.w3.org/2000/svg" style="background:#0a0a0f">

<!-- GLOMERULUS -->
<circle cx="180" cy="80" r="35" fill="none" stroke="#bb8fce" stroke-width="2.5"/>
<text x="180" y="75" text-anchor="middle" fill="#bb8fce" font-size="11" font-weight="bold" font-family="monospace">GLOMERULUS</text>
<text x="180" y="90" text-anchor="middle" fill="#bb8fce" font-size="9" font-family="monospace">Bowman's capsule</text>

<!-- Afferent arteriole -->
<line x1="80" y1="60" x2="145" y2="72" stroke="#bb8fce" stroke-width="2" marker-end="url(#arrowPurple)"/>
<text x="60" y="52" fill="#ddd" font-size="9" font-family="monospace">Afferent</text>
<text x="42" y="63" fill="#888" font-size="8" font-family="monospace">PG dilates / NSAID constricts</text>

<!-- Efferent arteriole -->
<line x1="215" y1="72" x2="280" y2="55" stroke="#bb8fce" stroke-width="2" marker-end="url(#arrowPurple)"/>
<text x="285" y="48" fill="#ddd" font-size="9" font-family="monospace">Efferent</text>
<text x="285" y="60" fill="#bb8fce" font-size="8" font-family="monospace">Ang II constricts</text>
<text x="285" y="71" fill="#e74c3c" font-size="8" font-weight="bold" font-family="monospace">ACEi/ARB dilate → renoprotect</text>
<text x="285" y="82" fill="#888" font-size="8" font-family="monospace">Cr ≤30% rise = keep. >30% = stop.</text>

<!-- PCT: left arm going down -->
<path d="M 180 115 L 180 320" stroke="#4ecdc4" stroke-width="4" fill="none"/>
<rect x="5" y="130" width="165" height="195" rx="6" fill="#0d2926" stroke="#4ecdc4" stroke-width="1" opacity="0.9"/>
<text x="15" y="148" fill="#4ecdc4" font-size="11" font-weight="bold" font-family="monospace">PCT "Bulk Worker"</text>
<text x="15" y="165" fill="#ccc" font-size="9" font-family="monospace">65% Na⁺, ALL glucose</text>
<text x="15" y="178" fill="#ccc" font-size="9" font-family="monospace">ALL HCO₃⁻ (CA-II)</text>
<text x="15" y="191" fill="#ccc" font-size="9" font-family="monospace">ALL amino acids, 85% PO₄</text>
<text x="15" y="204" fill="#ccc" font-size="9" font-family="monospace">90% uric acid (URAT1)</text>
<text x="15" y="222" fill="#4ecdc4" font-size="9" font-weight="bold" font-family="monospace">💊 SGLT2i (Dapa/Empa)</text>
<text x="15" y="235" fill="#4ecdc4" font-size="9" font-family="monospace">💊 Acetazolamide</text>
<text x="15" y="253" fill="#e74c3c" font-size="9" font-family="monospace">⚡ RTA Type 2 (HCO₃⁻ waste)</text>
<text x="15" y="266" fill="#e74c3c" font-size="9" font-family="monospace">⚡ Fanconi (global PCT fail)</text>
<text x="15" y="284" fill="#f7dc6f" font-size="8" font-family="monospace">SGLT2i → ↓urate (uricosuric)</text>
<text x="15" y="296" fill="#f7dc6f" font-size="8" font-family="monospace">Euglycemic DKA = the trap</text>
<text x="15" y="312" fill="#888" font-size="8" font-family="monospace">→ MetAcidosis, HypoK⁺, HypoPO₄</text>

<!-- LOOP OF HENLE: bottom curve -->
<path d="M 180 320 Q 180 480 320 480 Q 460 480 460 320" stroke="#45b7d1" stroke-width="4" fill="none"/>
<rect x="220" y="490" width="200" height="160" rx="6" fill="#0d1f26" stroke="#45b7d1" stroke-width="1" opacity="0.9"/>
<text x="230" y="508" fill="#45b7d1" font-size="11" font-weight="bold" font-family="monospace">LOH "Concentration Engine"</text>
<text x="230" y="525" fill="#ccc" font-size="9" font-family="monospace">25% Na⁺ via NKCC2</text>
<text x="230" y="538" fill="#ccc" font-size="9" font-family="monospace">(Na⁺/K⁺/2Cl⁻ cotransporter)</text>
<text x="230" y="551" fill="#ccc" font-size="9" font-family="monospace">Paracellular Ca²⁺, Mg²⁺</text>
<text x="230" y="569" fill="#45b7d1" font-size="9" font-weight="bold" font-family="monospace">💊 Furosemide (blocks NKCC2)</text>
<text x="230" y="587" fill="#e74c3c" font-size="9" font-family="monospace">⚡ Bartter = genetic furosemide</text>
<text x="230" y="605" fill="#888" font-size="8" font-family="monospace">→ HypoK⁺, MetAlk, HypoCa²⁺</text>
<text x="230" y="618" fill="#888" font-size="8" font-family="monospace">→ HypoMg²⁺, ↑Uric acid</text>
<text x="230" y="636" fill="#f7dc6f" font-size="8" font-family="monospace">Bartter=Big,Baby,Big loop</text>

<!-- DCT: right arm going up -->
<path d="M 460 320 L 460 180" stroke="#f7dc6f" stroke-width="4" fill="none"/>
<rect x="475" y="175" width="175" height="155" rx="6" fill="#262310" stroke="#f7dc6f" stroke-width="1" opacity="0.9"/>
<text x="485" y="193" fill="#f7dc6f" font-size="11" font-weight="bold" font-family="monospace">DCT "Fine Tuner"</text>
<text x="485" y="210" fill="#ccc" font-size="9" font-family="monospace">5% Na⁺ via NCC (Na⁺/Cl⁻)</text>
<text x="485" y="223" fill="#ccc" font-size="9" font-family="monospace">Ca²⁺ reabsorb (PTH→TRPV5)</text>
<text x="485" y="236" fill="#ccc" font-size="9" font-family="monospace">Mg²⁺ reabsorption</text>
<text x="485" y="254" fill="#f7dc6f" font-size="9" font-weight="bold" font-family="monospace">💊 Thiazide (blocks NCC)</text>
<text x="485" y="272" fill="#e74c3c" font-size="9" font-family="monospace">⚡ Gitelman = genetic thiazide</text>
<text x="485" y="290" fill="#888" font-size="8" font-family="monospace">→ HypoK⁺, HypoNa⁺ (#1 drug)</text>
<text x="485" y="303" fill="#888" font-size="8" font-family="monospace">→ ↑Uric acid, ↑Ca²⁺ (paradox)</text>
<text x="485" y="318" fill="#f7dc6f" font-size="8" font-family="monospace">Gitelman=Gentle,low maGnesium</text>

<!-- CD: continuing down from DCT -->
<path d="M 460 320 L 460 560" stroke="#e74c3c" stroke-width="4" fill="none"/>
<rect x="490" y="340" width="310" height="310" rx="6" fill="#1a0d0d" stroke="#e74c3c" stroke-width="1" opacity="0.9"/>
<text x="500" y="358" fill="#e74c3c" font-size="11" font-weight="bold" font-family="monospace">CD "Final Decision — 2 MASTERS"</text>

<!-- Master 1: Aldosterone -->
<text x="500" y="378" fill="#f7dc6f" font-size="10" font-weight="bold" font-family="monospace">MASTER 1: ALDOSTERONE</text>
<text x="500" y="393" fill="#ccc" font-size="8.5" font-family="monospace">Source: Zona glomerulosa (adrenal)</text>
<text x="500" y="406" fill="#ccc" font-size="8.5" font-family="monospace">Stimulus: Ang II + HyperK⁺ + ACTH</text>
<text x="500" y="419" fill="#ccc" font-size="8.5" font-family="monospace">→ MR receptor → ENaC (Na⁺ in)</text>
<text x="500" y="432" fill="#ccc" font-size="8.5" font-family="monospace">  + ROMK (K⁺ out) + H⁺-ATPase</text>
<text x="500" y="445" fill="#f7dc6f" font-size="8.5" font-family="monospace">💊 Spironolactone (MR block)</text>
<text x="500" y="458" fill="#e74c3c" font-size="8.5" font-family="monospace">⚡ Conn's = excess → HypoK⁺+HTN</text>
<text x="500" y="471" fill="#e74c3c" font-size="8.5" font-family="monospace">⚡ RTA4 = deficient → HYPERK⁺</text>
<text x="500" y="484" fill="#888" font-size="8" font-family="monospace">  RTA4 = DM#1 + ACEi. Commonest RTA.</text>

<!-- Master 2: AVP -->
<text x="500" y="504" fill="#e74c3c" font-size="10" font-weight="bold" font-family="monospace">MASTER 2: AVP/ADH (Vasopressin)</text>
<text x="500" y="519" fill="#ccc" font-size="8.5" font-family="monospace">Source: Supraoptic nucleus → post.pit</text>
<text x="500" y="532" fill="#ccc" font-size="8.5" font-family="monospace">Trigger: ↑Osm>285 / ↓Volume / AngII</text>
<text x="500" y="545" fill="#ccc" font-size="8.5" font-family="monospace">→ V2 receptor → cAMP → AQP2 insert</text>
<text x="500" y="558" fill="#ccc" font-size="8.5" font-family="monospace">  V1a=vasoconstrict V1b=ACTH</text>
<text x="500" y="571" fill="#e74c3c" font-size="8.5" font-family="monospace">💊 Desmopressin (V2 agonist→centralDI)</text>
<text x="500" y="584" fill="#e74c3c" font-size="8.5" font-family="monospace">💊 Tolvaptan (V2 antagonist→SIADH)</text>
<text x="500" y="597" fill="#e74c3c" font-size="8.5" font-family="monospace">⚡ SIADH=excess→dilutional HypoNa⁺</text>
<text x="500" y="610" fill="#e74c3c" font-size="8.5" font-family="monospace">⚡ CentralDI=no AVP (desmo works)</text>
<text x="500" y="623" fill="#e74c3c" font-size="8.5" font-family="monospace">⚡ NephroDI=V2 resist (desmo fails)</text>
<text x="500" y="636" fill="#888" font-size="8" font-family="monospace">  Lithium=#1 drug cause nephroDI</text>

<!-- Intercalated cells note -->
<rect x="490" y="650" width="310" height="35" rx="4" fill="#260d0d" stroke="#e74c3c" stroke-width="0.5"/>
<text x="500" y="663" fill="#ccc" font-size="8.5" font-family="monospace">α-Intercalated: H⁺ secretion (H⁺-ATPase)</text>
<text x="500" y="676" fill="#e74c3c" font-size="8.5" font-family="monospace">⚡ RTA1 = failure → pH>5.5 + HypoK⁺ + stones</text>

<!-- HORMONE ARROWS pointing to CD -->
<!-- Aldosterone arrow -->
<line x1="420" y1="395" x2="458" y2="395" stroke="#f7dc6f" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowYellow)"/>
<text x="350" y="392" fill="#f7dc6f" font-size="9" font-weight="bold" font-family="monospace" text-anchor="end">ALDO→</text>

<!-- AVP arrow -->
<line x1="420" y1="530" x2="458" y2="530" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
<text x="350" y="527" fill="#e74c3c" font-size="9" font-weight="bold" font-family="monospace" text-anchor="end">AVP→</text>

<!-- RAAS chain beside diagram -->
<rect x="620" y="50" width="185" height="120" rx="6" fill="#1a0d26" stroke="#bb8fce" stroke-width="1" opacity="0.9"/>
<text x="630" y="68" fill="#bb8fce" font-size="10" font-weight="bold" font-family="monospace">RAAS CASCADE</text>
<text x="630" y="84" fill="#ccc" font-size="8.5" font-family="monospace">↓Perfusion → RENIN</text>
<text x="630" y="97" fill="#ccc" font-size="8.5" font-family="monospace">→ Ang I → [ACE] → Ang II</text>
<text x="630" y="110" fill="#ccc" font-size="8.5" font-family="monospace">→ Aldosterone → CD</text>
<text x="630" y="128" fill="#e74c3c" font-size="8" font-weight="bold" font-family="monospace">X ACEi at ACE step</text>
<text x="630" y="141" fill="#ff6b35" font-size="8" font-weight="bold" font-family="monospace">X ARB at AT1 receptor</text>
<text x="630" y="154" fill="#bb8fce" font-size="8" font-weight="bold" font-family="monospace">X Sacubitril at neprilysin</text>
<text x="632" y="166" fill="#888" font-size="7.5" font-family="monospace">(neprilysin degrades ANP/BNP)</text>

<!-- URIC ACID box -->
<rect x="5" y="340" width="165" height="100" rx="6" fill="#111118" stroke="#4ecdc4" stroke-width="1" opacity="0.9"/>
<text x="15" y="358" fill="#4ecdc4" font-size="10" font-weight="bold" font-family="monospace">URIC ACID</text>
<text x="15" y="374" fill="#4ecdc4" font-size="8.5" font-family="monospace">SGLT2i → ↓urate (PCT)</text>
<text x="15" y="388" fill="#f7dc6f" font-size="8.5" font-family="monospace">Thiazide → ↑urate (DCT)</text>
<text x="15" y="402" fill="#45b7d1" font-size="8.5" font-family="monospace">Furosemide → ↑urate (vol)</text>
<text x="15" y="416" fill="#4ecdc4" font-size="8.5" font-family="monospace">Losartan → ↓urate (URAT1)</text>
<text x="15" y="430" fill="#888" font-size="7.5" font-family="monospace">Low-dose ASA → ↑urate</text>

<!-- Arrow markers -->
<defs>
<marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#bb8fce"/></marker>
<marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f7dc6f"/></marker>
<marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#e74c3c"/></marker>
</defs>

<!-- URINE output arrow -->
<line x1="460" y1="560" x2="460" y2="700" stroke="#666" stroke-width="2" marker-end="url(#arrowGrey)"/>
<text x="470" y="690" fill="#666" font-size="9" font-family="monospace">→ URINE</text>
<defs>
<marker id="arrowGrey" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#666"/></marker>
</defs>

</svg>
</body>

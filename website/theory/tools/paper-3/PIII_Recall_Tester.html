<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIII Recall Tester</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap');

  :root {
    --bg: #0a0a0c;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a33;
    --text: #e8e6e3;
    --text-dim: #8a8a95;
    --accent: #f0c040;
    --accent-dim: #f0c04030;
    --red: #e74c3c;
    --red-dim: #e74c3c25;
    --green: #2ecc71;
    --green-dim: #2ecc7125;
    --yellow: #f39c12;
    --yellow-dim: #f39c1225;
    --blue: #3498db;
    --blue-dim: #3498db25;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .header-stats {
    display: flex;
    gap: 1.5rem;
    font-size: 0.75rem;
    color: var(--text-dim);
  }
  .header-stats .stat-val {
    color: var(--text);
    font-weight: 500;
  }

  /* ── TOPIC GRID VIEW ── */
  .view { display: none; }
  .view.active { display: block; }

  .grid-container {
    padding: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  .tier-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin: 2rem 0 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.75rem;
  }
  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .topic-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .topic-card .zone-tag {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
  }
  .topic-card .topic-name {
    font-family: 'Instrument Serif', serif;
    font-size: 1rem;
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }
  .topic-card .score-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 0.5rem;
  }
  .topic-card .score-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }
  .topic-card .score-text {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
    display: flex;
    justify-content: space-between;
  }
  .topic-card .attempt-count {
    font-size: 0.6rem;
    color: var(--text-dim);
  }
  .topic-card.untested { border-left: 3px solid var(--text-dim); }
  .topic-card.score-low { border-left: 3px solid var(--red); }
  .topic-card.score-mid { border-left: 3px solid var(--yellow); }
  .topic-card.score-high { border-left: 3px solid var(--green); }

  /* ── RECALL TEST VIEW ── */
  .test-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
  }
  .test-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.5rem;
  }
  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .question-box {
    background: var(--surface);
    border: 1px solid var(--accent-dim);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .question-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .question-text {
    font-family: 'Instrument Serif', serif;
    font-size: 1.1rem;
    line-height: 1.5;
    color: var(--text);
  }

  .recall-area {
    width: 100%;
    min-height: 350px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .recall-area:focus { border-color: var(--accent); }
  .recall-area::placeholder { color: var(--text-dim); }

  .test-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
    gap: 1rem;
  }
  .word-count {
    font-size: 0.7rem;
    color: var(--text-dim);
  }
  .submit-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.6rem 1.5rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── RESULTS VIEW ── */
  .results-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
  }

  .score-display {
    text-align: center;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .score-big {
    font-family: 'Instrument Serif', serif;
    font-size: 4rem;
    font-weight: 400;
    line-height: 1;
  }
  .score-big .denominator {
    font-size: 1.5rem;
    color: var(--text-dim);
  }
  .score-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 0.5rem;
  }

  .result-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .result-section-header {
    padding: 0.75rem 1rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-section-header:hover { background: var(--border); }
  .result-section-body {
    padding: 1rem;
  }

  /* Keyword hits/misses */
  .keyword-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.4rem;
  }
  .kw-item {
    font-size: 0.75rem;
    padding: 0.35rem 0.6rem;
    border-radius: 3px;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .kw-hit {
    background: var(--green-dim);
    color: var(--green);
  }
  .kw-miss {
    background: var(--red-dim);
    color: var(--red);
  }
  .kw-icon { font-size: 0.65rem; }

  /* Error pattern alerts */
  .pattern-alert {
    background: var(--yellow-dim);
    border: 1px solid var(--yellow);
    border-radius: 6px;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
    font-size: 0.8rem;
  }
  .pattern-alert-title {
    color: var(--yellow);
    font-weight: 500;
    margin-bottom: 0.3rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Retention items */
  .retention-list {
    list-style: none;
    counter-reset: ret;
  }
  .retention-list li {
    counter-increment: ret;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    line-height: 1.5;
  }
  .retention-list li:last-child { border-bottom: none; }
  .retention-list li::before {
    content: counter(ret) ".";
    color: var(--accent);
    font-weight: 500;
    margin-right: 0.5rem;
  }

  /* Next actions */
  .next-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }
  .action-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    transition: all 0.2s;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .action-btn.primary:hover { opacity: 0.9; }

  /* History panel */
  .history-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-top: 1.5rem;
    max-height: 250px;
    overflow-y: auto;
  }
  .history-item {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-item:last-child { border-bottom: none; }

  /* Reset button */
  .reset-all {
    margin-top: 2rem;
    text-align: center;
  }
  .reset-all button {
    background: none;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 0.4rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .reset-all button:hover { opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 600px) {
    .header { flex-direction: column; gap: 0.5rem; }
    .topic-grid { grid-template-columns: 1fr; }
    .test-container, .results-container { padding: 1rem; }
    .recall-area { min-height: 250px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>PIII Recall Tester</h1>
  <div class="header-stats">
    <span>Topics: <span class="stat-val" id="stat-tested">0</span>/25</span>
    <span>Avg: <span class="stat-val" id="stat-avg">—</span></span>
    <span>Sessions: <span class="stat-val" id="stat-sessions">0</span></span>
  </div>
</div>

<!-- VIEW 1: Topic Grid -->
<div id="view-grid" class="view active">
  <div class="grid-container">
    <div class="tier-label">Tier 1 — Highest Convergence (Top 10)</div>
    <div class="topic-grid" id="tier1-grid"></div>

    <div class="tier-label">Tier 2 — Moderate Convergence</div>
    <div class="topic-grid" id="tier2-grid"></div>

    <div class="reset-all">
      <button onclick="resetAll()">Reset all scores</button>
    </div>
  </div>
</div>

<!-- VIEW 2: Recall Test -->
<div id="view-test" class="view">
  <div class="test-container">
    <div class="test-header">
      <button class="back-btn" onclick="showGrid()">← Back</button>
      <span id="test-topic-zone" class="zone-tag" style="font-size:0.65rem;color:var(--text-dim);"></span>
    </div>
    <div class="question-box">
      <div class="question-label">Predicted Setter Question</div>
      <div class="question-text" id="test-question"></div>
    </div>
    <textarea class="recall-area" id="recall-input" placeholder="Write your recall here. Include pathophysiology, classification, clinical features, diagnosis, and management. Don't forget Dx + Rx + Key numbers at the end."></textarea>
    <div class="test-actions">
      <span class="word-count" id="word-count">0 words</span>
      <button class="submit-btn" id="submit-btn" onclick="gradeRecall()">Grade Recall</button>
    </div>
  </div>
</div>

<!-- VIEW 3: Results -->
<div id="view-results" class="view">
  <div class="results-container" id="results-content"></div>
</div>

<script>
// ══════════════════════════════════════════════════
// TOPIC DATA — All 25 PIII Topics
// ══════════════════════════════════════════════════

const TOPICS = [
  // ── TIER 1 (Ranks 1-10) ──
  {
    id: "thyroid",
    name: "Thyroid — Hyperthyroidism / Graves",
    zone: "Zone H · Endocrine",
    tier: 1,
    question: "Discuss the causes, clinical features, diagnosis and management of Hyperthyroidism. Write a note on Thyroid storm.",
    keywords: [
      { term: "Graves disease", weight: 1, section: "etiology", aliases: ["graves", "grave's disease"] },

      { term: "Toxic MNG / toxic adenoma", weight: 0.5, section: "etiology", aliases: ["toxic multinodular", "toxic adenoma", "plummer"] },

// STATE MANAGEMENT

const STORAGE_KEY = "piii_recall_v2";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getTopicState(topicId) {
  const state = loadState();
  return state[topicId] || { attempts: [], bestScore: null, lastScore: null };
}

function saveAttempt(topicId, score, hits, misses, total) {
  const state = loadState();
  if (!state[topicId]) state[topicId] = { attempts: [], bestScore: null, lastScore: null };
  const attempt = {
    date: new Date().toISOString(),
    score,
    hits,
    misses,
    total
  };
  state[topicId].attempts.push(attempt);
  state[topicId].lastScore = score;
  state[topicId].bestScore = Math.max(state[topicId].bestScore || 0, score);
  saveState(state);
}

function resetAll() {
  if (confirm("Reset ALL scores and history? This cannot be undone.")) {
    localStorage.removeItem(STORAGE_KEY);
    renderGrid();
    updateStats();
  }
}

// GRADING ENGINE

function gradeRecall() {
  const input = document.getElementById("recall-input").value.trim();
  if (!input || input.length < 30) {
    alert("Write at least a few sentences before grading.");
    return;
  }

  const topic = TOPICS.find(t => t.id === currentTopicId);
  if (!topic) return;

  const inputLower = input.toLowerCase();
  const words = inputLower.split(/\s+/);
  const wordCount = words.length;

  // Keyword matching
  let hits = [];
  let misses = [];
  let totalWeight = 0;
  let earnedWeight = 0;

  topic.keywords.forEach(kw => {
    totalWeight += kw.weight;
    const allTerms = [kw.term.toLowerCase(), ...(kw.aliases || []).map(a => a.toLowerCase())];
    const found = allTerms.some(term => {
      // Multi-word matching
      if (term.includes(" ")) {
        return inputLower.includes(term);
      }
      // Single word — check if it appears
      return words.some(w => w.includes(term) || term.includes(w));
    });
    if (found) {
      hits.push(kw);
      earnedWeight += kw.weight;
    } else {
      misses.push(kw);
    }
  });

  // Calculate score (0-10)
  let rawScore = (earnedWeight / totalWeight) * 10;

  // Penalty: very short answers
  if (wordCount < 100) rawScore = Math.min(rawScore, 5);
  if (wordCount < 50) rawScore = Math.min(rawScore, 3);

  // Round to 0.5
  const score = Math.round(rawScore * 2) / 2;

  // Detect error patterns
  const patterns = detectErrorPatterns(topic, inputLower, hits, misses);

  // Save
  saveAttempt(topic.id, score, hits.length, misses.length, topic.keywords.length);

  // Render results
  renderResults(topic, score, hits, misses, patterns, wordCount);
}

function detectErrorPatterns(topic, inputLower, hits, misses) {
  const patterns = [];

  // TAIL-DROP: Check if treatment/management keywords are mostly missing
  const txKeywords = misses.filter(k => k.section === "treatment" || k.section === "emergency");
  const txTotal = [...hits, ...misses].filter(k => k.section === "treatment" || k.section === "emergency");
  if (txTotal.length > 0 && txKeywords.length / txTotal.length > 0.5) {
    patterns.push({
      type: "TAIL-DROP",
      title: "⚠ Tail-Drop Pattern Detected",
      detail: `You missed ${txKeywords.length}/${txTotal.length} treatment/management keywords. ${topic.errorTraps.tailDrop}`
    });
  }

  // OPPOSITE-SWAP: Check for known swap pairs
  if (topic.errorTraps.oppositeSwap) {
    patterns.push({
      type: "OPPOSITE-SWAP-WARNING",
      title: "🔄 Opposite-Swap Checkpoint",
      detail: topic.errorTraps.oppositeSwap
    });
  }

  // CROSS-CONTAMINATION warning
  if (topic.errorTraps.crossContam) {
    patterns.push({
      type: "CROSS-CONTAM-WARNING",
      title: "🔀 Cross-Contamination Checkpoint",
      detail: topic.errorTraps.crossContam
    });
  }

  return patterns;
}

let currentTopicId = null;

function renderGrid() {
  const state = loadState();

  ["tier1-grid", "tier2-grid"].forEach(gridId => {
    const tier = gridId === "tier1-grid" ? 1 : 2;
    const grid = document.getElementById(gridId);
    grid.innerHTML = "";

    TOPICS.filter(t => t.tier === tier).forEach(topic => {
      const ts = state[topic.id];
      const score = ts?.lastScore;
      const best = ts?.bestScore;
      const attempts = ts?.attempts?.length || 0;

      let scoreClass = "untested";
      let fillColor = "var(--text-dim)";
      let fillWidth = 0;
      if (score !== null && score !== undefined) {
        if (score >= 7) { scoreClass = "score-high"; fillColor = "var(--green)"; }
        else if (score >= 5) { scoreClass = "score-mid"; fillColor = "var(--yellow)"; }
        else { scoreClass = "score-low"; fillColor = "var(--red)"; }
        fillWidth = (score / 10) * 100;
      }

      const card = document.createElement("div");
      card.className = `topic-card ${scoreClass}`;
      card.onclick = () => startTest(topic.id);
      card.innerHTML = `
        <div class="zone-tag">${topic.zone}</div>
        <div class="topic-name">${topic.name}</div>
        <div class="score-bar"><div class="score-fill" style="width:${fillWidth}%;background:${fillColor}"></div></div>
        <div class="score-text">
          <span>${score !== null && score !== undefined ? score + '/10' : 'Not tested'}</span>
          <span class="attempt-count">${attempts > 0 ? attempts + ' attempt' + (attempts > 1 ? 's' : '') : ''}</span>
        </div>
      `;
      grid.appendChild(card);
    });
  });
}

function updateStats() {
  const state = loadState();
  let tested = 0, totalScore = 0, totalSessions = 0;

  TOPICS.forEach(t => {
    const ts = state[t.id];
    if (ts && ts.lastScore !== null && ts.lastScore !== undefined) {
      tested++;
      totalScore += ts.lastScore;
    }
    if (ts && ts.attempts) totalSessions += ts.attempts.length;
  });

  document.getElementById("stat-tested").textContent = tested;
  document.getElementById("stat-avg").textContent = tested > 0 ? (totalScore / tested).toFixed(1) : "—";
  document.getElementById("stat-sessions").textContent = totalSessions;
}

function showView(viewId) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(viewId).classList.add("active");
}

function showGrid() {
  renderGrid();
  updateStats();
  showView("view-grid");
}

function startTest(topicId) {
  currentTopicId = topicId;
  const topic = TOPICS.find(t => t.id === topicId);
  if (!topic) return;

  document.getElementById("test-topic-zone").textContent = topic.zone;
  document.getElementById("test-question").textContent = topic.question;
  document.getElementById("recall-input").value = "";
  document.getElementById("word-count").textContent = "0 words";
  document.getElementById("submit-btn").disabled = false;

  showView("view-test");
  document.getElementById("recall-input").focus();
}

function startNextWeakest() {
  const state = loadState();

  // Find untested tier 1 first, then lowest-scored
  let candidate = null;
  let lowestScore = 11;

  // Priority 1: untested Tier 1
  for (const t of TOPICS.filter(x => x.tier === 1)) {
    const ts = state[t.id];
    if (!ts || ts.lastScore === null || ts.lastScore === undefined) {
      candidate = t.id;
      break;
    }
  }

  // Priority 2: lowest-scored Tier 1
  if (!candidate) {
    for (const t of TOPICS.filter(x => x.tier === 1)) {
      const ts = state[t.id];
      if (ts && ts.lastScore < lowestScore) {
        lowestScore = ts.lastScore;
        candidate = t.id;
      }
    }
  }

  // Priority 3: untested Tier 2
  if (!candidate) {
    for (const t of TOPICS.filter(x => x.tier === 2)) {
      const ts = state[t.id];
      if (!ts || ts.lastScore === null || ts.lastScore === undefined) {
        candidate = t.id;
        break;
      }
    }
  }

  // Priority 4: lowest-scored Tier 2
  if (!candidate) {
    for (const t of TOPICS.filter(x => x.tier === 2)) {
      const ts = state[t.id];
      if (ts && ts.lastScore < lowestScore) {
        lowestScore = ts.lastScore;
        candidate = t.id;
      }
    }
  }

  if (candidate) startTest(candidate);
  else showGrid();
}

  <path d="M190 190 C235 198 280 212 318 232" stroke="#6B5540" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M172 255 C218 252 265 262 310 282" stroke="#6B5540" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M155 320 C200 312 245 318 288 332" stroke="#6B5540" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M248 135 C268 172 278 210 272 248" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M318 115 C330 155 335 200 322 240" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M370 95 C372 135 370 175 362 215" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.45"/>

  <!-- PARIETAL LOBE sulci -->
  <path d="M448 115 C455 162 450 210 438 255" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M490 128 C495 172 488 218 475 262" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M445 175 C478 185 510 188 542 182" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M445 225 C478 232 510 235 540 230" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.45"/>

  <!-- TEMPORAL LOBE sulci -->
  <path d="M275 390 C325 382 375 375 420 372 C465 370 510 374 548 385" stroke="#6B5540" stroke-width="0.9" fill="none" opacity="0.5"/>
  <path d="M258 438 C305 428 358 422 412 418 C462 416 508 420 548 432" stroke="#6B5540" stroke-width="0.9" fill="none" opacity="0.5"/>
  <path d="M248 488 C298 478 350 472 408 468 C458 466 508 472 548 485" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.45"/>

  <!-- OCCIPITAL LOBE sulci -->
  <path d="M592 188 C612 232 622 278 612 322" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M635 228 C648 272 652 318 638 362" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.5"/>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="rgba(245,158,11,1)" stop-opacity="0.08"/>
      <stop offset="35%" stop-color="#0A2540" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1a1a14" stop-opacity="0.4"/>
    </linearGradient>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#6B5540" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <pattern id="crosshatch" patternUnits="userSpaceOnUse" width="5" height="5">
      <line x1="0" y1="0" x2="5" y2="5" stroke="#6B5540" stroke-width="0.3" opacity="0.2"/>
      <line x1="5" y1="0" x2="0" y2="5" stroke="#6B5540" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#0A2540"/>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#crosshatch)" opacity="0.6"/>
  <!-- Brain lateral outline -->
  <path d="M400 75 C270 75 145 120 105 210 C65 300 78 380 110 440 C140 490 195 525 265 545
           C225 558 200 580 218 595 C238 608 280 600 320 588
           C350 596 390 600 425 596
           C465 600 505 605 538 592
           C568 602 598 595 610 575
           C628 555 612 528 580 518
           C632 488 672 438 695 375
           C718 312 718 248 695 195
           C672 142 608 100 528 85 C472 75 435 73 400 75Z"
        stroke="#4A3828" stroke-width="2.8" fill="url(#hatch)" fill-opacity="0.2"/>

  <!-- Central (Rolandic) fissure — PROMINENT -->
  <path d="M428 85 C422 130 405 185 385 250 C370 305 360 350 355 395"
        stroke="#4A3828" stroke-width="2" fill="none"/>

  <!-- Lateral (Sylvian) fissure — PROMINENT -->
  <path d="M255 360 C300 348 355 328 410 318 C465 308 515 302 555 308"
        stroke="#4A3828" stroke-width="2" fill="none"/>

  <!-- Parieto-occipital sulcus -->
  <path d="M570 108 C558 165 538 230 518 295"

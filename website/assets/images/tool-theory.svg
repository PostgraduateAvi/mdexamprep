  <path d="M572 458 C615 445 658 458 678 480 C698 505 685 540 662 552 C642 562 612 562 592 552 C572 542 565 518 565 498 C565 478 568 465 572 458Z"
        stroke="#4A3828" stroke-width="2" fill="url(#hatch)" fill-opacity="0.3"/>
  <!-- Folia -->
  <path d="M575 470 C605 464 638 468 668 478" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M570 488 C602 482 635 486 665 495" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M572 505 C602 500 632 503 658 512" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.45"/>
  <path d="M575 522 C600 518 628 520 650 528" stroke="#6B5540" stroke-width="0.6" fill="none" opacity="0.4"/>
  <path d="M580 538 C598 535 618 536 638 542" stroke="#6B5540" stroke-width="0.5" fill="none" opacity="0.35"/>

  <!-- Brainstem -->
  <path d="M545 500 L532 548 L522 588" stroke="#4A3828" stroke-width="1.8" fill="none"/>
  <path d="M560 495 L568 548 L575 578" stroke="#6B5540" stroke-width="1.2" fill="none" opacity="0.5"/>

  <!-- LOBE LABELS (bold, positioned inside regions) -->
  <text x="215" y="275" font-family="serif" font-size="16" fill="#6B5540" opacity="0.75" font-weight="bold" font-style="italic">Frontal</text>
  <text x="450" y="218" font-family="serif" font-size="16" fill="#6B5540" opacity="0.75" font-weight="bold" font-style="italic">Parietal</text>
  <text x="600" y="282" font-family="serif" font-size="15" fill="#6B5540" opacity="0.75" font-weight="bold" font-style="italic">Occipital</text>
  <text x="335" y="448" font-family="serif" font-size="16" fill="#6B5540" opacity="0.75" font-weight="bold" font-style="italic">Temporal</text>

  <!-- Annotation leader lines -->
  <line x1="428" y1="88" x2="520" y2="58" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>
  <text x="525" y="56" font-family="serif" font-size="12" fill="#8B7355" opacity="0.7" font-style="italic">Central sulcus</text>

  <line x1="410" y1="318" x2="470" y2="345" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>
  <text x="475" y="350" font-family="serif" font-size="12" fill="#8B7355" opacity="0.7" font-style="italic">Lateral fissure</text>

  <line x1="635" y1="500" x2="720" y2="510" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>

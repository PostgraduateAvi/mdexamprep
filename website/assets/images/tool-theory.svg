  <line x1="540" y1="550" x2="610" y2="572" stroke="#8B7355" stroke-width="0.5" opacity="0.4"/>
  <text x="615" y="575" font-family="serif" font-size="11" fill="#8B7355" opacity="0.6" font-style="italic">Brainstem</text>

  <!-- Brodmann area markers -->
  <circle cx="250" cy="232" r="4" fill="#6B5540" opacity="0.2"/>
  <text x="258" y="236" font-family="monospace" font-size="8" fill="#6B5540" opacity="0.4" font-weight="bold">4</text>
  <circle cx="465" cy="188" r="4" fill="#6B5540" opacity="0.2"/>
  <text x="473" y="192" font-family="monospace" font-size="7" fill="#6B5540" opacity="0.4" font-weight="bold">3,1,2</text>
  <circle cx="630" cy="262" r="4" fill="#6B5540" opacity="0.2"/>
  <text x="638" y="266" font-family="monospace" font-size="8" fill="#6B5540" opacity="0.4" font-weight="bold">17</text>
  <circle cx="360" cy="418" r="4" fill="#6B5540" opacity="0.2"/>
  <text x="368" y="422" font-family="monospace" font-size="8" fill="#6B5540" opacity="0.4" font-weight="bold">22</text>
  <circle cx="180" cy="310" r="4" fill="#6B5540" opacity="0.2"/>
  <text x="188" y="314" font-family="monospace" font-size="8" fill="#6B5540" opacity="0.4" font-weight="bold">44</text>

  <!-- Data nodes -->
  <text x="40" y="570" font-family="monospace" font-size="9" fill="#A89878" opacity="0.5">[198 flashcards]</text>
  <text x="40" y="585" font-family="monospace" font-size="9" fill="#A89878" opacity="0.5">[11 body systems catalogued]</text>
  <text x="560" y="585" font-family="serif" font-size="10" fill="#A89878" opacity="0.4" font-style="italic">systematic verification pattern</text>

  <!-- Dimension -->
  <line x1="88" y1="78" x2="88" y2="588" stroke="#A89878" stroke-width="0.4" opacity="0.2"/>
  <line x1="83" y1="78" x2="93" y2="78" stroke="#A89878" stroke-width="0.5" opacity="0.25"/>
  <line x1="83" y1="588" x2="93" y2="588" stroke="#A89878" stroke-width="0.5" opacity="0.25"/>

</svg>
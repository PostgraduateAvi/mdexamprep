<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="rgba(0,212,255,1)" stop-opacity="0.08"/>
      <stop offset="35%" stop-color="#0A2540" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1a1a14" stop-opacity="0.4"/>
    </linearGradient>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#6B5540" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <pattern id="crosshatch" patternUnits="userSpaceOnUse" width="5" height="5">
      <line x1="0" y1="0" x2="5" y2="5" stroke="#6B5540" stroke-width="0.3" opacity="0.2"/>
      <line x1="5" y1="0" x2="0" y2="5" stroke="#6B5540" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#0A2540"/>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#crosshatch)" opacity="0.6"/>
  <!-- Skull outline -->
  <path d="M400 70 C270 70 170 130 150 230 C130 330 145 400 180 450 C210 490 260 520 320 540 C360 550 400 555 400 555 C400 555 440 550 480 540 C540 520 590 490 620 450 C655 400 670 330 650 230 C630 130 530 70 400 70Z"
        stroke="#4A3828" stroke-width="2.5" fill="none"/>
  <!-- Inner vault -->
  <path d="M400 90 C290 90 200 145 180 235 C165 310 175 370 200 420 C225 455 265 480 320 500"
        stroke="#6B5540" stroke-width="1.2" fill="none" opacity="0.6"/>
  <path d="M400 90 C510 90 600 145 620 235 C635 310 625 370 600 420 C575 455 535 480 480 500"
        stroke="#6B5540" stroke-width="1.2" fill="none" opacity="0.6"/>

  <!-- Cerebrum filled mass -->
  <path d="M400 100 C290 100 210 155 190 240 C175 310 195 380 240 430 C280 465 340 485 400 485 C460 485 520 465 560 430 C605 380 625 310 610 240 C590 155 510 100 400 100Z"
        stroke="#4A3828" stroke-width="1.8" fill="url(#hatch)" fill-opacity="0.35"/>

  <!-- Corpus callosum (thick C-shape) -->
  <path d="M270 240 C300 215 360 205 400 205 C440 205 500 215 530 240"
        stroke="#4A3828" stroke-width="2.5" fill="none"/>
  <path d="M275 255 C305 232 365 222 400 222 C435 222 495 232 525 255"
        stroke="#6B5540" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Gyri / Sulci - BOLD -->
  <path d="M250 160 C280 175 300 205 290 240" stroke="#4A3828" stroke-width="1.2" fill="none" opacity="0.8"/>
  <path d="M310 130 C330 160 335 195 320 225" stroke="#4A3828" stroke-width="1.2" fill="none" opacity="0.8"/>
  <path d="M370 110 C375 145 378 185 370 215" stroke="#4A3828" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M430 110 C425 145 422 185 430 215" stroke="#4A3828" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M490 130 C470 160 465 195 480 225" stroke="#4A3828" stroke-width="1.2" fill="none" opacity="0.8"/>
  <path d="M550 160 C520 175 500 205 510 240" stroke="#4A3828" stroke-width="1.2" fill="none" opacity="0.8"/>
  <!-- Lower sulci -->
  <path d="M230 260 C255 290 265 330 250 370" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M570 260 C545 290 535 330 550 370" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M270 320 C295 350 305 390 290 420" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M530 320 C505 350 495 390 510 420" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.5"/>

  <!-- Thalamus -->
  <ellipse cx="400" cy="290" rx="45" ry="28" stroke="#4A3828" stroke-width="1.5" fill="url(#hatch)" fill-opacity="0.3"/>
  <text x="378" y="295" font-family="serif" font-size="9" fill="#8B7355" opacity="0.7" font-style="italic">Thal.</text>

  <!-- Hypothalamus -->
  <ellipse cx="388" cy="335" rx="22" ry="14" stroke="#6B5540" stroke-width="1.2" fill="none" opacity="0.7"/>

  <!-- Pituitary gland -->
  <ellipse cx="388" cy="365" rx="14" ry="10" stroke="#4A3828" stroke-width="1.2" fill="url(#hatch)" fill-opacity="0.35"/>
  <line x1="388" y1="349" x2="388" y2="355" stroke="#6B5540" stroke-width="1"/>

  <!-- Cerebellum -->
  <path d="M490 415 C530 395 575 405 590 425 C605 450 585 485 555 500 C525 510 490 500 475 475 C462 455 470 430 490 415Z"
        stroke="#4A3828" stroke-width="2" fill="url(#hatch)" fill-opacity="0.35"/>
  <!-- Folia lines -->
  <path d="M490 420 C520 415 555 420 580 432" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.6"/>
  <path d="M482 438 C515 432 548 436 575 448" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.6"/>
  <path d="M478 456 C510 450 542 453 567 462" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.6"/>
  <path d="M480 472 C508 467 535 470 555 478" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.6"/>
  <path d="M485 488 C505 484 525 486 545 492" stroke="#6B5540" stroke-width="0.6" fill="none" opacity="0.5"/>

  <!-- Brainstem -->
  <path d="M425 395 L435 450 C440 480 435 510 425 545"
        stroke="#4A3828" stroke-width="2.2" fill="none"/>
  <path d="M375 395 L365 450 C360 480 365 510 375 545"
        stroke="#4A3828" stroke-width="2.2" fill="none"/>
  <!-- Pons bulge -->
  <path d="M370 425 C385 445 415 445 430 425" stroke="#6B5540" stroke-width="1.2" fill="none" opacity="0.7"/>
  <!-- Medulla -->
  <path d="M378 480 C388 492 412 492 422 480" stroke="#6B5540" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Lateral ventricle (glowing) -->
  <path d="M355 255 C370 238 395 235 400 238 C405 235 430 238 445 255 L432 290 C420 278 410 275 400 277 C390 275 380 278 368 290Z"
        stroke="rgba(0,212,255,0.4)" stroke-width="0.8" fill="rgba(0,212,255,0.04)" filter="url(#glow)"/>

  <!-- Spinal cord -->
  <path d="M393 545 L390 590" stroke="#6B5540" stroke-width="1.8" fill="none"/>
  <path d="M407 545 L410 590" stroke="#6B5540" stroke-width="1.8" fill="none"/>

  <!-- ANNOTATION LABELS with leader lines -->
  <line x1="255" y1="165" x2="100" y2="130" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>
  <text x="25" y="128" font-family="serif" font-size="12" fill="#8B7355" opacity="0.7" font-style="italic">Frontal lobe</text>

  <line x1="530" y1="165" x2="680" y2="130" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>
  <text x="685" y="128" font-family="serif" font-size="12" fill="#8B7355" opacity="0.7" font-style="italic">Parietal lobe</text>

  <line x1="500" y1="440" x2="660" y2="415" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>
  <text x="665" y="413" font-family="serif" font-size="12" fill="#8B7355" opacity="0.7" font-style="italic">Cerebellum</text>

  <line x1="440" y1="290" x2="640" y2="280" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>
  <text x="645" y="278" font-family="serif" font-size="12" fill="#8B7355" opacity="0.7" font-style="italic">Thalamus</text>

  <line x1="400" y1="215" x2="600" y2="195" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>
  <text x="605" y="193" font-family="serif" font-size="11" fill="#8B7355" opacity="0.6" font-style="italic">Corpus callosum</text>

  <line x1="400" y1="455" x2="280" y2="530" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>
  <text x="170" y="535" font-family="serif" font-size="12" fill="#8B7355" opacity="0.7" font-style="italic">Brainstem</text>

  <line x1="388" y1="365" x2="240" y2="390" stroke="#8B7355" stroke-width="0.5" opacity="0.4"/>
  <text x="130" y="393" font-family="serif" font-size="11" fill="#8B7355" opacity="0.6" font-style="italic">Pituitary</text>

  <!-- Data nodes -->
  <text x="40" y="570" font-family="monospace" font-size="9" fill="#A89878" opacity="0.5">[987 questions catalogued]</text>
  <text x="40" y="585" font-family="monospace" font-size="9" fill="#A89878" opacity="0.5">[20 years of pattern data]</text>
  <text x="560" y="570" font-family="serif" font-size="10" fill="#A89878" opacity="0.4" font-style="italic">&#x2211; f(t) = convergence</text>

  <!-- Dimension lines -->
  <line x1="140" y1="75" x2="140" y2="555" stroke="#A89878" stroke-width="0.4" opacity="0.2"/>
  <line x1="135" y1="75" x2="145" y2="75" stroke="#A89878" stroke-width="0.5" opacity="0.25"/>
  <line x1="135" y1="555" x2="145" y2="555" stroke="#A89878" stroke-width="0.5" opacity="0.25"/>
  <text x="130" y="320" font-family="serif" font-size="8" fill="#A89878" opacity="0.3" font-style="italic" transform="rotate(-90,130,320)">sagittal section</text>

</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="rgba(59,130,246,1)" stop-opacity="0.08"/>
      <stop offset="35%" stop-color="#0A2540" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1a1a14" stop-opacity="0.4"/>
    </linearGradient>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#6B5540" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <pattern id="crosshatch" patternUnits="userSpaceOnUse" width="5" height="5">
      <line x1="0" y1="0" x2="5" y2="5" stroke="#6B5540" stroke-width="0.3" opacity="0.2"/>
      <line x1="5" y1="0" x2="0" y2="5" stroke="#6B5540" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#0A2540"/>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#crosshatch)" opacity="0.6"/>
  <!-- Trachea -->
  <path d="M400 50 L400 155" stroke="#4A3828" stroke-width="3" fill="none"/>
  <path d="M386 50 L386 150" stroke="#6B5540" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M414 50 L414 150" stroke="#6B5540" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Tracheal rings -->
  <line x1="388" y1="65" x2="412" y2="65" stroke="#6B5540" stroke-width="0.7" opacity="0.5"/>
  <line x1="388" y1="80" x2="412" y2="80" stroke="#6B5540" stroke-width="0.7" opacity="0.5"/>
  <line x1="388" y1="95" x2="412" y2="95" stroke="#6B5540" stroke-width="0.7" opacity="0.5"/>
  <line x1="388" y1="110" x2="412" y2="110" stroke="#6B5540" stroke-width="0.7" opacity="0.5"/>
  <line x1="388" y1="125" x2="412" y2="125" stroke="#6B5540" stroke-width="0.7" opacity="0.5"/>
  <line x1="388" y1="140" x2="412" y2="140" stroke="#6B5540" stroke-width="0.7" opacity="0.5"/>

  <!-- Carina -->
  <circle cx="400" cy="158" r="4" fill="#6B5540" opacity="0.5"/>

  <!-- Main bronchi -->
  <path d="M400 158 C365 180 290 205 235 235" stroke="#4A3828" stroke-width="2.2" fill="none"/>
  <path d="M400 158 C435 180 510 205 565 235" stroke="#4A3828" stroke-width="2.2" fill="none"/>

  <!-- LEFT LUNG -->
  <path d="M235 235 C170 248 108 290 88 355 C68 420 80 475 115 515 C150 555 205 575 270 575 C330 575 370 555 390 515 C410 475 412 420 402 360 C395 310 378 270 348 248"
        stroke="#4A3828" stroke-width="2.5" fill="url(#hatch)" fill-opacity="0.25"/>
  <!-- Cardiac notch -->
  <path d="M348 395 C360 420 368 445 350 465 C332 480 315 472 310 455"
        stroke="#6B5540" stroke-width="1.2" fill="none" opacity="0.6"/>
  <!-- Left oblique fissure -->
  <path d="M315 260 C295 315 275 400 255 465 C240 510 225 540 205 560"
        stroke="#4A3828" stroke-width="1.2" fill="none" opacity="0.7"/>

  <!-- RIGHT LUNG -->
  <path d="M565 235 C630 248 692 290 712 355 C732 420 720 475 685 515 C650 555 595 575 530 575 C470 575 430 555 410 515 C390 475 388 420 398 360 C405 310 422 270 452 248"
        stroke="#4A3828" stroke-width="2.5" fill="url(#hatch)" fill-opacity="0.25"/>
  <!-- Right horizontal fissure -->
  <path d="M425 365 C480 355 545 352 610 358 C650 362 680 370 700 380"
        stroke="#4A3828" stroke-width="1.2" fill="none" opacity="0.7"/>
  <!-- Right oblique fissure -->
  <path d="M485 260 C505 315 525 400 545 465 C560 510 575 540 595 560"
        stroke="#4A3828" stroke-width="1.2" fill="none" opacity="0.7"/>

  <!-- LEFT secondary bronchi -->
  <path d="M235 235 C225 260 195 295 170 320" stroke="#6B5540" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M250 245 C245 275 235 315 215 355" stroke="#6B5540" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M265 255 C260 290 265 335 280 380" stroke="#6B5540" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Tertiary -->
  <path d="M170 320 C158 345 140 370 130 400" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M170 320 C182 345 195 380 185 410" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M215 355 C205 385 185 420 175 455" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M215 355 C225 385 240 425 230 460" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M280 380 C270 410 255 445 250 480" stroke="#6B5540" stroke-width="0.6" fill="none" opacity="0.4"/>
  <path d="M280 380 C290 415 300 450 290 485" stroke="#6B5540" stroke-width="0.6" fill="none" opacity="0.4"/>

  <!-- RIGHT secondary bronchi -->
  <path d="M565 235 C575 260 605 295 630 320" stroke="#6B5540" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M550 245 C555 275 565 315 585 355" stroke="#6B5540" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M535 255 C540 290 535 335 520 380" stroke="#6B5540" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Tertiary -->
  <path d="M630 320 C642 345 660 370 670 400" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M630 320 C618 345 605 380 615 410" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M585 355 C595 385 615 420 625 455" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M585 355 C575 385 560 425 570 460" stroke="#6B5540" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M520 380 C530 410 545 445 550 480" stroke="#6B5540" stroke-width="0.6" fill="none" opacity="0.4"/>
  <path d="M520 380 C510 415 500 450 510 485" stroke="#6B5540" stroke-width="0.6" fill="none" opacity="0.4"/>

  <!-- Heart silhouette -->
  <path d="M355 360 C342 395 332 430 345 460 C358 488 388 502 408 502 C428 502 450 492 460 465 C470 438 460 400 448 370"
        stroke="#6B5540" stroke-width="1" fill="url(#hatch)" fill-opacity="0.2" opacity="0.5"/>

  <!-- Diaphragm -->
  <path d="M75 548 C200 508 310 525 400 535 C490 525 600 508 725 548"
        stroke="#6B5540" stroke-width="1.2" fill="none" opacity="0.4" stroke-dasharray="6,4"/>

  <!-- LABELS -->
  <line x1="400" y1="100" x2="510" y2="72" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>
  <text x="515" y="70" font-family="serif" font-size="12" fill="#8B7355" opacity="0.7" font-style="italic">Trachea</text>

  <line x1="400" y1="158" x2="280" y2="128" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>
  <text x="185" y="126" font-family="serif" font-size="12" fill="#8B7355" opacity="0.7" font-style="italic">Carina</text>

  <line x1="180" y1="420" x2="80" y2="440" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>
  <text x="20" y="442" font-family="serif" font-size="13" fill="#8B7355" opacity="0.7" font-style="italic">Left lung</text>

  <line x1="620" y1="420" x2="720" y2="440" stroke="#8B7355" stroke-width="0.6" opacity="0.5"/>
  <text x="725" y="442" font-family="serif" font-size="13" fill="#8B7355" opacity="0.7" font-style="italic">Right lung</text>

  <line x1="610" y1="358" x2="720" y2="340" stroke="#8B7355" stroke-width="0.5" opacity="0.4"/>
  <text x="725" y="338" font-family="serif" font-size="10" fill="#8B7355" opacity="0.5" font-style="italic">Horizontal fissure</text>

  <line x1="345" y1="460" x2="260" y2="495" stroke="#8B7355" stroke-width="0.5" opacity="0.4"/>
  <text x="170" y="500" font-family="serif" font-size="10" fill="#8B7355" opacity="0.5" font-style="italic">Cardiac notch</text>

  <!-- Data nodes -->
  <text x="40" y="570" font-family="monospace" font-size="9" fill="#A89878" opacity="0.5">[21 clinical cases]</text>
  <text x="40" y="585" font-family="monospace" font-size="9" fill="#A89878" opacity="0.5">[110 viva questions distributed]</text>
  <text x="560" y="570" font-family="serif" font-size="10" fill="#A89878" opacity="0.4" font-style="italic">5 body systems mapped</text>

  <!-- Dimension -->
  <line x1="68" y1="235" x2="68" y2="575" stroke="#A89878" stroke-width="0.4" opacity="0.2"/>
  <line x1="63" y1="235" x2="73" y2="235" stroke="#A89878" stroke-width="0.5" opacity="0.25"/>
  <line x1="63" y1="575" x2="73" y2="575" stroke="#A89878" stroke-width="0.5" opacity="0.25"/>

</svg>
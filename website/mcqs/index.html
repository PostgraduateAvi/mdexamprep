<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCQs &mdash; MBBEasy</title>
  <meta name="description" content="1,000 AIIMS and NEET PG entrance MCQs across 11 body systems. Filter by system, test yourself, track your score.">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="canonical" href="https://mdexamprep.vercel.app/mcqs">
  <meta name="theme-color" content="#0f1117">
  <link rel="manifest" href="/manifest.json">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mdexamprep.vercel.app/mcqs/">
  <meta property="og:title" content="MCQs — MBBEasy">
  <meta property="og:description" content="1,000 AIIMS and NEET PG entrance MCQs across 11 body systems.">
  <meta property="og:image" content="https://mdexamprep.vercel.app/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="site-nav"></div>
  <main class="container" style="padding-bottom: 64px;">
    <div class="page-header">
      <h1>Practice MCQs</h1>
      <p style="color: var(--text-secondary); margin-top: 12px; font-size: 1.125rem;">1,000 MCQs from AIIMS &amp; NEET PG entrance exams. Filter by system, click to reveal answers.</p>
    </div>
    <div class="score-bar">
      <div class="score-tracker" id="score-tracker">
        <span class="score-correct" id="score-correct">0</span>/<span class="score-total" id="score-total">0</span> correct
        <span class="score-sep">&middot;</span>
        <span class="score-streak-label">Streak</span> <span class="score-streak" id="score-streak">0</span>
      </div>
      <button class="btn-reset" id="mcq-reset" title="Reset all progress">Reset</button>
    </div>

    <div id="quiz-mode-bar" class="quiz-mode-bar"></div>
    <div class="exam-timer" id="exam-timer" style="display:none;">
      <span class="timer-icon">&#9201;</span>
      <span class="timer-text">60:00</span>
    </div>

    <div class="system-btns" id="mcq-system-filters"></div>
    <div class="difficulty-btns" id="difficulty-filters"></div>
    <div class="filter-status" id="mcq-filter-status"></div>
    <div id="mcq-deck"></div>
  </main>
  <div id="site-footer"></div>
  <script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js');
  var _r=false;
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(_r)return;_r=true;window.location.reload();
  });
}
</script>
  <script src="../assets/js/template.js?v=6"></script>
  <script src="mcqs.js"></script>
</body>
</html>

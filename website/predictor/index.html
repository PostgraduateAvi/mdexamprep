<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic Predictor &mdash; MBBEasy</title>
  <meta name="description" content="Upload your past papers or paste questions. Topics are matched and ranked by how likely they are to appear next.">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="canonical" href="https://mdexamprep.vercel.app/predictor">
  <meta name="theme-color" content="#09090b">
  <link rel="manifest" href="/manifest.json">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mdexamprep.vercel.app/predictor/">
  <meta property="og:title" content="Topic Predictor — MBBEasy">
  <meta property="og:description" content="Upload your past papers or paste questions. Topics are matched and ranked by how likely they are to appear next.">
  <meta property="og:image" content="https://mdexamprep.vercel.app/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="../style.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="site-nav"></div>
  <main class="container" style="padding-top: 100px;">
    <section id="state-choose" class="predictor-choose">
      <div class="choose-content">
        <h1>Upload your exam papers.</h1>
        <p class="choose-sub">Paste your questions or upload files. Topics are matched and ranked by how likely they are to appear.</p>
        <div class="input-tabs">
          <button id="tab-paste" class="input-tab active">Paste Text</button>
          <button id="tab-upload" class="input-tab">Upload File</button>
        </div>
        <div id="pane-paste" class="input-pane">
          <textarea id="paste-area" class="paste-area" rows="8" placeholder="Paste exam questions here, one per line...&#10;&#10;Example:&#10;Discuss the pathogenesis of diabetic ketoacidosis&#10;Write short notes on rheumatic heart disease&#10;Enumerate causes of hepatosplenomegaly"></textarea>
          <button id="paste-submit" class="btn btn-primary paste-submit">Analyze Questions</button>
        </div>
        <div id="pane-upload" class="input-pane" style="display:none;">
          <div id="upload-zone" class="upload-zone" role="button" tabindex="0" aria-label="Upload exam papers">
            <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" /></svg>
            <p class="upload-label">Drag files here or click to browse</p>
            <p class="upload-formats">.pdf .xlsx .xls</p>
            <input type="file" id="file-input" multiple accept=".pdf,.xlsx,.xls" hidden>
          </div>
        </div>
        <p class="choose-demo">Or <a href="#" id="demo-link">try with demo data</a></p>
      </div>
    </section>
    <section id="state-parsing" class="predictor-parsing" style="display:none;" aria-live="polite">
      <div class="parsing-content">
        <div class="loading-spinner"></div>
        <p id="parsing-status" class="parsing-status">Reading files...</p>
        <div class="parsing-progress"><div id="parsing-bar" class="parsing-bar-fill"></div></div>
        <p id="parsing-detail" class="parsing-detail"></p>
      </div>
    </section>
    <section id="state-results" style="display:none;">
      <div class="results-topbar">
        <div class="results-meta">
          <p id="results-source" class="results-source"></p>
          <button id="start-over" class="btn btn-secondary btn-sm">Upload new papers</button>
        </div>
        <div class="results-controls">
          <div class="view-toggles" id="view-toggles">
            <button class="btn btn-sm view-btn active" data-view="ranked">Ranked</button>
            <button class="btn btn-sm view-btn" data-view="slots">By Slot</button>
            <button class="btn btn-sm view-btn" data-view="systems">By System</button>
          </div>
          <div id="predictor-stats" class="stats-bar"></div>
        </div>
      </div>
      <div id="predictor-results" class="results-grid"></div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');</script>
  <script src="../assets/js/template.js"></script>
  <script src="../assets/js/predictor-engine.js"></script>
  <script src="upload-parser.js"></script>
  <script src="predictor-ui.js"></script>
</body>
</html>

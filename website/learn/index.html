<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn &mdash; MBBEasy</title>
  <meta name="description" content="Browse 390+ medical topics by system. Each topic expands to reveal flashcards, study hints, and interactive tools inline.">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="canonical" href="https://mdexamprep.vercel.app/learn">
  <meta name="theme-color" content="#0f1117">
  <link rel="manifest" href="/manifest.json">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mdexamprep.vercel.app/learn/">
  <meta property="og:title" content="Learn — MBBEasy">
  <meta property="og:description" content="Browse 390+ medical topics by system. Flashcards, study hints, and interactive tools inline.">
  <meta property="og:image" content="https://mdexamprep.vercel.app/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="site-nav"></div>
  <main class="container" style="padding-bottom: 64px;">
    <div class="page-header">
      <h1>Learn</h1>
      <p style="color: var(--text-secondary); margin-top: 12px; font-size: 1.125rem;">Browse topics by system. Expand any topic to study flashcards and hints inline.</p>
    </div>

    <div class="sr-banner" id="sr-banner" style="display:none;"></div>

    <div class="learn-controls">
      <input type="search" class="topic-search" id="topic-search" placeholder="Search topics&hellip;" autocomplete="off">
      <div class="learn-controls-row">
        <div class="view-toggle">
          <button class="view-toggle-btn active" data-mode="browse">By System</button>
          <button class="view-toggle-btn" data-mode="path">Study Path</button>
        </div>
        <button class="yield-toggle" id="yield-toggle">High Yield</button>
      </div>
    </div>
    <div class="system-btns" id="system-filters"></div>
    <div class="filter-status" id="filter-status"></div>
    <div id="topic-deck"></div>

    <hr class="section-divider">

    <h2>Study Tools</h2>
    <p style="color: var(--text-secondary); margin: 12px 0 24px; font-size: 1.125rem;">32 interactive diagrams, drills, and visual imprints.</p>
    <div id="tools-catalog"></div>
  </main>
  <div id="site-footer"></div>
  <div class="sr-overlay" id="sr-overlay">
    <div class="sr-overlay-header">
      <h3>Flashcard Review</h3>
      <button class="sr-close-btn" id="sr-close">&times;</button>
    </div>
    <div id="sr-card-container"></div>
  </div>
  <script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js');
  var _r=false;
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(_r)return;_r=true;window.location.reload();
  });
}
</script>
  <script src="../assets/js/template.js?v=6"></script>
  <script src="learn.js"></script>
</body>
</html>

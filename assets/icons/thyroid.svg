<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="organ-icon">
  <defs>
    <filter id="thyroidShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <radialGradient id="thyroidGradL" cx="55%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="35%" stop-color="#F97316"/>
      <stop offset="75%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </radialGradient>
    <radialGradient id="thyroidGradR" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="35%" stop-color="#F97316"/>
      <stop offset="75%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </radialGradient>
    <radialGradient id="thyroidHighlight" cx="35%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="isthmusGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="tracheaGradT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D1D5DB"/>
      <stop offset="50%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </linearGradient>
  </defs>
  <!-- Trachea behind thyroid -->
  <rect x="28" y="4" width="8" height="56" rx="4" fill="url(#tracheaGradT)" opacity="0.5"/>
  <!-- Tracheal rings -->
  <line x1="28.5" y1="10" x2="35.5" y2="10" stroke="#9CA3AF" stroke-width="0.5" opacity="0.5"/>
  <line x1="28.5" y1="15" x2="35.5" y2="15" stroke="#9CA3AF" stroke-width="0.5" opacity="0.5"/>
  <line x1="28.5" y1="20" x2="35.5" y2="20" stroke="#9CA3AF" stroke-width="0.5" opacity="0.5"/>
  <line x1="28.5" y1="25" x2="35.5" y2="25" stroke="#9CA3AF" stroke-width="0.5" opacity="0.4"/>
  <line x1="28.5" y1="42" x2="35.5" y2="42" stroke="#9CA3AF" stroke-width="0.5" opacity="0.4"/>
  <line x1="28.5" y1="47" x2="35.5" y2="47" stroke="#9CA3AF" stroke-width="0.5" opacity="0.4"/>
  <line x1="28.5" y1="52" x2="35.5" y2="52" stroke="#9CA3AF" stroke-width="0.5" opacity="0.4"/>
  <!-- Left lobe -->
  <path d="M28 30 C24 28 14 22 10 26 C6 30 8 42 12 48 C16 54 24 52 28 46 C30 42 30 34 28 30Z" fill="url(#thyroidGradL)" filter="url(#thyroidShadow)"/>
  <!-- Right lobe -->
  <path d="M36 30 C40 28 50 22 54 26 C58 30 56 42 52 48 C48 54 40 52 36 46 C34 42 34 34 36 30Z" fill="url(#thyroidGradR)" filter="url(#thyroidShadow)"/>
  <!-- Isthmus connecting lobes -->
  <path d="M28 34 C30 32 34 32 36 34 L36 40 C34 42 30 42 28 40Z" fill="url(#isthmusGrad)"/>
  <!-- Lobular texture — left lobe -->
  <circle cx="18" cy="32" r="3" fill="none" stroke="#C2410C" stroke-width="0.3" opacity="0.25"/>
  <circle cx="14" cy="38" r="2.5" fill="none" stroke="#C2410C" stroke-width="0.3" opacity="0.25"/>
  <circle cx="20" cy="40" r="2.5" fill="none" stroke="#C2410C" stroke-width="0.3" opacity="0.25"/>
  <circle cx="16" cy="44" r="2" fill="none" stroke="#C2410C" stroke-width="0.3" opacity="0.2"/>
  <circle cx="22" cy="34" r="2" fill="none" stroke="#C2410C" stroke-width="0.3" opacity="0.2"/>
  <!-- Lobular texture — right lobe -->
  <circle cx="46" cy="32" r="3" fill="none" stroke="#C2410C" stroke-width="0.3" opacity="0.25"/>
  <circle cx="50" cy="38" r="2.5" fill="none" stroke="#C2410C" stroke-width="0.3" opacity="0.25"/>
  <circle cx="44" cy="40" r="2.5" fill="none" stroke="#C2410C" stroke-width="0.3" opacity="0.25"/>
  <circle cx="48" cy="44" r="2" fill="none" stroke="#C2410C" stroke-width="0.3" opacity="0.2"/>
  <circle cx="42" cy="34" r="2" fill="none" stroke="#C2410C" stroke-width="0.3" opacity="0.2"/>
  <!-- Parathyroid glands (posterior, visible as subtle dots) -->
  <circle cx="24" cy="36" r="1.5" fill="#EA580C" stroke="#C2410C" stroke-width="0.3" opacity="0.6"/>
  <circle cx="24" cy="44" r="1.5" fill="#EA580C" stroke="#C2410C" stroke-width="0.3" opacity="0.6"/>
  <circle cx="40" cy="36" r="1.5" fill="#EA580C" stroke="#C2410C" stroke-width="0.3" opacity="0.6"/>
  <circle cx="40" cy="44" r="1.5" fill="#EA580C" stroke="#C2410C" stroke-width="0.3" opacity="0.6"/>
  <!-- Specular highlights -->
  <ellipse cx="18" cy="30" rx="5" ry="3" fill="url(#thyroidHighlight)" transform="rotate(-20 18 30)"/>
  <ellipse cx="48" cy="30" rx="5" ry="3" fill="url(#thyroidHighlight)" transform="rotate(20 48 30)"/>
  <ellipse cx="16" cy="28" rx="2.5" ry="1.5" fill="white" opacity="0.1" transform="rotate(-20 16 28)"/>
  <ellipse cx="48" cy="28" rx="2.5" ry="1.5" fill="white" opacity="0.1" transform="rotate(20 48 28)"/>
</svg>
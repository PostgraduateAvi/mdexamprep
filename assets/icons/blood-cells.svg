<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="organ-icon">
  <defs>
    <filter id="cellShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0.5" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <!-- RBC gradient — biconcave disc appearance -->
    <radialGradient id="rbcGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9F1239"/>
      <stop offset="30%" stop-color="#BE123C"/>
      <stop offset="55%" stop-color="#F43F5E"/>
      <stop offset="80%" stop-color="#FB7185"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </radialGradient>
    <radialGradient id="rbcGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#881337"/>
      <stop offset="25%" stop-color="#A3163A"/>
      <stop offset="55%" stop-color="#E11D48"/>
      <stop offset="80%" stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#E11D48"/>
    </radialGradient>
    <radialGradient id="rbcHighlight" cx="35%" cy="30%" r="25%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <!-- WBC gradient -->
    <radialGradient id="wbcGrad" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F5D0FE"/>
      <stop offset="40%" stop-color="#E879F9"/>
      <stop offset="80%" stop-color="#C026D3"/>
      <stop offset="100%" stop-color="#A21CAF"/>
    </radialGradient>
    <radialGradient id="wbcHighlight" cx="30%" cy="25%" r="28%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <!-- Platelet gradient -->
    <radialGradient id="plateletGrad" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FECDD3"/>
      <stop offset="60%" stop-color="#FDA4AF"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </radialGradient>
  </defs>

  <!-- Background RBC (smaller, darker — behind) -->
  <ellipse cx="48" cy="14" rx="8" ry="5" fill="url(#rbcGrad2)" opacity="0.5" transform="rotate(-25 48 14)" filter="url(#cellShadow)"/>
  <ellipse cx="48" cy="14" rx="3.5" ry="2" fill="#881337" opacity="0.25" transform="rotate(-25 48 14)"/>

  <!-- RBC 1 — front left, tilted 3/4 view -->
  <ellipse cx="20" cy="28" rx="12" ry="7" fill="url(#rbcGrad1)" transform="rotate(-15 20 28)" filter="url(#cellShadow)"/>
  <!-- Central dimple -->
  <ellipse cx="20" cy="28" rx="5" ry="3" fill="#9F1239" opacity="0.4" transform="rotate(-15 20 28)"/>
  <ellipse cx="20" cy="28" rx="3" ry="1.8" fill="#881337" opacity="0.2" transform="rotate(-15 20 28)"/>
  <!-- Rim highlight -->
  <path d="M10 24 C14 20 22 20 28 22" fill="none" stroke="#FFF" stroke-width="0.6" opacity="0.25" transform="rotate(-15 20 28)"/>
  <ellipse cx="16" cy="24" rx="4" ry="2" fill="url(#rbcHighlight)" transform="rotate(-15 16 24)"/>

  <!-- RBC 2 — center right, more tilted -->
  <ellipse cx="42" cy="34" rx="11" ry="6" fill="url(#rbcGrad1)" transform="rotate(20 42 34)" filter="url(#cellShadow)"/>
  <ellipse cx="42" cy="34" rx="4.5" ry="2.5" fill="#9F1239" opacity="0.4" transform="rotate(20 42 34)"/>
  <ellipse cx="42" cy="34" rx="2.5" ry="1.5" fill="#881337" opacity="0.2" transform="rotate(20 42 34)"/>
  <ellipse cx="38" cy="30" rx="3.5" ry="2" fill="url(#rbcHighlight)" transform="rotate(20 38 30)"/>

  <!-- RBC 3 — bottom center -->
  <ellipse cx="26" cy="48" rx="11" ry="5.5" fill="url(#rbcGrad2)" transform="rotate(5 26 48)" filter="url(#cellShadow)"/>
  <ellipse cx="26" cy="48" rx="4.5" ry="2.2" fill="#9F1239" opacity="0.35" transform="rotate(5 26 48)"/>
  <ellipse cx="22" cy="45" rx="3.5" ry="1.8" fill="url(#rbcHighlight)" transform="rotate(5 22 45)"/>

  <!-- RBC 4 — back right lower -->
  <ellipse cx="50" cy="50" rx="9" ry="5" fill="url(#rbcGrad2)" opacity="0.6" transform="rotate(-10 50 50)" filter="url(#cellShadow)"/>
  <ellipse cx="50" cy="50" rx="3.5" ry="2" fill="#881337" opacity="0.2" transform="rotate(-10 50 50)"/>

  <!-- WBC — larger, irregular, lighter -->
  <path d="M18 12 C22 8 30 8 32 12 C34 16 32 20 30 22 C28 24 22 26 18 22 C14 18 14 14 18 12Z" fill="url(#wbcGrad)" filter="url(#cellShadow)"/>
  <!-- WBC surface texture -->
  <circle cx="24" cy="14" r="2.5" fill="none" stroke="#A21CAF" stroke-width="0.3" opacity="0.3"/>
  <circle cx="22" cy="18" r="2" fill="none" stroke="#A21CAF" stroke-width="0.3" opacity="0.25"/>
  <circle cx="28" cy="16" r="1.5" fill="none" stroke="#A21CAF" stroke-width="0.3" opacity="0.2"/>
  <!-- WBC nucleus (multi-lobed) -->
  <path d="M22 14 C20 12 22 10 24 12 C26 14 28 12 28 14 C28 16 26 18 24 16 C22 14 20 16 22 14Z" fill="#86198F" opacity="0.4"/>
  <!-- WBC highlight -->
  <ellipse cx="22" cy="12" rx="3" ry="2" fill="url(#wbcHighlight)"/>

  <!-- Platelets -->
  <path d="M8 40 C10 38 12 38 13 40 C14 42 12 43 10 42 C8 41 7 41 8 40Z" fill="url(#plateletGrad)" filter="url(#cellShadow)"/>
  <path d="M56 24 C57 22 59 23 59 25 C59 27 57 27 56 26 C55 25 55 24 56 24Z" fill="url(#plateletGrad)" opacity="0.7" filter="url(#cellShadow)"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="organ-icon">
  <defs>
    <filter id="s" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity=".3"/>
    </filter>
    <radialGradient id="g" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="45%" stop-color="#EF4444"/>
      <stop offset="85%" stop-color="#B91C1C"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </radialGradient>
    <radialGradient id="h" cx="28%" cy="22%" r="28%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Heart body: conical, wide at base (top), apex bottom-left -->
  <path d="M18 12C14 12 8 16 8 24C8 32 12 40 20 48C24 52 26 54 22 56C26 54 30 48 34 42C40 34 48 28 50 22C52 16 50 12 44 12C40 12 36 14 34 18C32 14 26 12 22 12Z" fill="url(#g)" filter="url(#s)" stroke="#7F1D1D" stroke-width=".3"/>
  <!-- Right ventricle bulge -->
  <path d="M34 18C38 22 44 26 48 24C50 22 50 16 44 12C40 12 36 14 34 18Z" fill="url(#g)" stroke="#991B1B" stroke-width=".2" opacity=".85"/>
  <!-- Aortic arch curving up and over -->
  <path d="M28 14C28 8 30 4 34 3C38 2 42 4 44 8C45 10 44 12 42 13" fill="none" stroke="#991B1B" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M28 14C28 8 30 4 34 3C38 2 42 4 44 8C45 10 44 12 42 13" fill="none" stroke="#EF4444" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Aortic branches -->
  <path d="M33 4L32 1M36 3L37 .5M39 3.5L41 1" fill="none" stroke="#B91C1C" stroke-width="1" stroke-linecap="round"/>
  <!-- Pulmonary trunk from upper right -->
  <path d="M38 14C36 10 34 8 30 8C26 8 22 6 18 4" fill="none" stroke="#7F1D1D" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M38 14C36 10 34 8 30 8C26 8 22 6 18 4" fill="none" stroke="#EF4444" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Pulmonary bifurcation -->
  <path d="M22 5.5C20 4 16 3 14 4M22 5.5C22 3.5 20 2 18 1.5" fill="none" stroke="#B91C1C" stroke-width="1" stroke-linecap="round"/>
  <!-- Superior vena cava from top right -->
  <path d="M46 12C48 8 50 4 49 1" fill="none" stroke="#7F1D1D" stroke-width="3" stroke-linecap="round"/>
  <path d="M46 12C48 8 50 4 49 1" fill="none" stroke="#9CA3AF" stroke-width="1.4" stroke-linecap="round" opacity=".6"/>
  <!-- Inferior vena cava -->
  <path d="M46 24C50 30 53 36 52 42" fill="none" stroke="#7F1D1D" stroke-width="2" stroke-linecap="round"/>
  <path d="M46 24C50 30 53 36 52 42" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-linecap="round" opacity=".5"/>
  <!-- Interventricular septum -->
  <path d="M30 20C30 28 28 38 24 50" fill="none" stroke="#991B1B" stroke-width=".6" opacity=".45"/>
  <!-- Atrioventricular groove -->
  <path d="M12 22C18 24 30 24 48 20" fill="none" stroke="#991B1B" stroke-width=".5" opacity=".35"/>
  <!-- LAD coronary artery -->
  <path d="M28 16C26 22 24 30 22 40C21 44 22 48 22 52" fill="none" stroke="#DC2626" stroke-width=".5" opacity=".5"/>
  <!-- Right coronary artery -->
  <path d="M40 16C42 20 44 24 44 28C44 32 42 36 38 40" fill="none" stroke="#DC2626" stroke-width=".45" opacity=".45"/>
  <!-- Circumflex -->
  <path d="M26 18C20 20 14 24 12 30C10 34 12 38 14 42" fill="none" stroke="#B91C1C" stroke-width=".35" opacity=".35"/>
  <!-- Diagonal branches -->
  <path d="M26 26C24 28 22 28 20 30M27 32C25 34 23 34 21 36M42 22C44 23 45 25 46 26" fill="none" stroke="#B91C1C" stroke-width=".25" opacity=".3"/>
  <!-- Specular highlight upper-left -->
  <ellipse cx="18" cy="18" rx="7" ry="5" fill="url(#h)" transform="rotate(-15 18 18)"/>
  <ellipse cx="16" cy="16" rx="3" ry="2" fill="#fff" opacity=".18" transform="rotate(-20 16 16)"/>
  <!-- Depth shading -->
  <path d="M44 14C48 18 50 24 48 30M10 28C12 34 16 40 20 46" fill="none" stroke="#7F1D1D" stroke-width=".3" opacity=".18"/>
</svg>
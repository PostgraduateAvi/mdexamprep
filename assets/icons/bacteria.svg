<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="organ-icon">
  <defs>
    <filter id="bacteriaShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="capsuleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.133 0 0 0 0 0.773 0 0 0 0 0.369 0 0 0 0.3 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bacteriaGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="35%" stop-color="#22C55E"/>
      <stop offset="75%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <radialGradient id="bacteriaHighlight" cx="30%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bacteriaSmallGrad" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="50%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <linearGradient id="flagellaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#86EFAC" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background bacterium 1 (smaller, semi-transparent) -->
  <rect x="6" y="8" width="16" height="7" rx="3.5" fill="url(#bacteriaSmallGrad)" opacity="0.25" transform="rotate(-30 14 12)"/>
  <!-- Background bacterium 2 -->
  <rect x="46" y="48" width="14" height="6" rx="3" fill="url(#bacteriaSmallGrad)" opacity="0.2" transform="rotate(15 53 51)"/>

  <!-- Main bacterium — capsule outline (glow) -->
  <rect x="12" y="22" width="36" height="16" rx="8" fill="none" stroke="#22C55E" stroke-width="2" opacity="0.15" filter="url(#capsuleGlow)"/>

  <!-- Main cell wall body -->
  <rect x="14" y="24" width="32" height="12" rx="6" fill="url(#bacteriaGrad)" filter="url(#bacteriaShadow)"/>

  <!-- Capsule border -->
  <rect x="14" y="24" width="32" height="12" rx="6" fill="none" stroke="#166534" stroke-width="0.5" opacity="0.4"/>

  <!-- Nucleoid region (slightly lighter, irregular shape inside) -->
  <path d="M24 28 C28 26 34 26 38 28 C40 30 38 34 34 34 C30 34 26 34 24 32 C22 30 22 29 24 28Z" fill="#15803D" opacity="0.3"/>
  <path d="M26 29 C30 27 34 28 36 30 C34 32 28 32 26 30Z" fill="#166534" opacity="0.15"/>

  <!-- Ribosomes (small dots scattered inside) -->
  <circle cx="20" cy="28" r="0.7" fill="#166534" opacity="0.5"/>
  <circle cx="22" cy="32" r="0.6" fill="#166534" opacity="0.45"/>
  <circle cx="18" cy="30" r="0.5" fill="#166534" opacity="0.4"/>
  <circle cx="40" cy="28" r="0.7" fill="#166534" opacity="0.5"/>
  <circle cx="42" cy="31" r="0.6" fill="#166534" opacity="0.45"/>
  <circle cx="38" cy="33" r="0.5" fill="#166534" opacity="0.4"/>
  <circle cx="30" cy="27" r="0.5" fill="#166534" opacity="0.35"/>
  <circle cx="32" cy="33" r="0.5" fill="#166534" opacity="0.35"/>
  <circle cx="26" cy="34" r="0.5" fill="#166534" opacity="0.3"/>

  <!-- Flagella (wavy tails from left end) -->
  <path d="M14 28 C10 24 6 28 4 24 C2 20 0 24 -2 20" fill="none" stroke="url(#flagellaGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M14 30 C10 34 6 30 4 34 C2 38 -1 34 -3 38" fill="none" stroke="url(#flagellaGrad)" stroke-width="1" stroke-linecap="round"/>
  <path d="M14 32 C10 30 8 34 5 30 C3 28 1 32 -1 28" fill="none" stroke="url(#flagellaGrad)" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Surface detail lines on cell wall -->
  <path d="M20 25 C24 24.5 32 24.5 40 25" fill="none" stroke="#166534" stroke-width="0.3" opacity="0.2"/>
  <path d="M20 35 C24 35.5 32 35.5 40 35" fill="none" stroke="#166534" stroke-width="0.3" opacity="0.2"/>

  <!-- Specular highlight -->
  <ellipse cx="28" cy="26" rx="10" ry="3" fill="url(#bacteriaHighlight)"/>
  <ellipse cx="26" cy="26" rx="5" ry="1.5" fill="white" opacity="0.12"/>
</svg>